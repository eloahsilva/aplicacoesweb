<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Meus produtos ({{qtd}})</h3>
    <table>
        <tr>
            <th>Nome</th>
            <th>Preço</th>
        </tr>
        {% for i in itens %}
            <tr>
                <td>{{i.nome}}</td>
                <td>{{i.preco}}</td>
            </tr>
        {% endfor %}
    </table>
</body>
</html>
